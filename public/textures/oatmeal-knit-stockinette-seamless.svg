<svg xmlns="http://www.w3.org/2000/svg" width="4096" height="4096" viewBox="0 0 512 512" role="img" aria-label="Seamless chunky knitted wool stockinette texture in mottled oatmeal beige">
  <defs>
    <linearGradient id="baseTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7d4b8" />
      <stop offset="52%" stop-color="#d8c0a0" />
      <stop offset="100%" stop-color="#c7a886" />
    </linearGradient>

    <linearGradient id="yarnTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2e6d2" />
      <stop offset="45%" stop-color="#dcc2a0" />
      <stop offset="100%" stop-color="#bc976f" />
    </linearGradient>

    <linearGradient id="yarnShadow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6845" stop-opacity="0.58" />
      <stop offset="100%" stop-color="#6f5133" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="yarnHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ea" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#fff7ea" stop-opacity="0" />
    </linearGradient>

    <filter id="stitchDepth" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="1.3" stdDeviation="1.2" flood-color="#4e3823" flood-opacity="0.4" />
      <feDropShadow dx="0" dy="-0.7" stdDeviation="0.9" flood-color="#fff3de" flood-opacity="0.24" />
    </filter>

    <filter id="fiberOverlay" x="0" y="0" width="100%" height="100%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.9"
        numOctaves="3"
        seed="13"
        stitchTiles="stitch"
        result="noise"
      />
      <feColorMatrix
        in="noise"
        type="matrix"
        values="
          0 0 0 0 0.76
          0 0 0 0 0.66
          0 0 0 0 0.54
          0 0 0 0.16 0
        "
        result="warmNoise"
      />
      <feBlend in="SourceGraphic" in2="warmNoise" mode="multiply" />
    </filter>

    <pattern id="stockinette" width="48" height="42" patternUnits="userSpaceOnUse">
      <rect width="48" height="42" fill="none" />

      <path
        d="M24 5 C13.4 5 8.2 14.2 11.9 23.1 L20.6 38.1 C21.4 39.6 22.6 40.4 24 40.4 C25.4 40.4 26.6 39.6 27.4 38.1 L36.1 23.1 C39.8 14.2 34.6 5 24 5 Z"
        fill="url(#yarnTone)"
        filter="url(#stitchDepth)"
      />

      <path
        d="M24 8 C16.9 8 13.5 14.2 15.7 20.6 L23.1 33.7 C23.5 34.4 24.5 34.4 24.9 33.7 L32.3 20.6 C34.5 14.2 31.1 8 24 8 Z"
        fill="url(#yarnHighlight)"
      />

      <path
        d="M24 11 C17.8 11 14.8 16.1 16.5 21.1 L24 34.1 L31.5 21.1 C33.2 16.1 30.2 11 24 11 Z"
        fill="url(#yarnShadow)"
      />

      <path
        d="M0 21 C8 14.2 16 14.2 24 21 C32 14.2 40 14.2 48 21"
        fill="none"
        stroke="#6f5133"
        stroke-opacity="0.22"
        stroke-width="1.25"
      />

      <path
        d="M0 23 C8 16.3 16 16.3 24 23 C32 16.3 40 16.3 48 23"
        fill="none"
        stroke="#fff5e3"
        stroke-opacity="0.16"
        stroke-width="1.05"
      />
    </pattern>

    <pattern id="darkFlecks" width="128" height="128" patternUnits="userSpaceOnUse">
      <rect width="128" height="128" fill="none" />
      <circle cx="12" cy="18" r="1.1" fill="#5f432a" fill-opacity="0.44" />
      <circle cx="36" cy="9" r="0.9" fill="#4f3722" fill-opacity="0.46" />
      <circle cx="53" cy="27" r="1.0" fill="#6a4b2f" fill-opacity="0.4" />
      <circle cx="78" cy="20" r="0.85" fill="#5c4129" fill-opacity="0.45" />
      <circle cx="96" cy="32" r="1.15" fill="#694a2f" fill-opacity="0.38" />
      <circle cx="110" cy="14" r="0.75" fill="#4b341f" fill-opacity="0.5" />
      <circle cx="18" cy="52" r="1.0" fill="#66492d" fill-opacity="0.38" />
      <circle cx="42" cy="46" r="0.8" fill="#5f4329" fill-opacity="0.42" />
      <circle cx="68" cy="58" r="1.15" fill="#583e26" fill-opacity="0.44" />
      <circle cx="85" cy="49" r="0.95" fill="#4f3823" fill-opacity="0.45" />
      <circle cx="103" cy="63" r="1.0" fill="#6b4b2f" fill-opacity="0.37" />
      <circle cx="120" cy="53" r="0.85" fill="#523924" fill-opacity="0.45" />
      <circle cx="11" cy="86" r="0.9" fill="#563c25" fill-opacity="0.42" />
      <circle cx="29" cy="74" r="1.1" fill="#6a4b2f" fill-opacity="0.38" />
      <circle cx="57" cy="91" r="0.8" fill="#4f3621" fill-opacity="0.5" />
      <circle cx="79" cy="80" r="1.05" fill="#5d4128" fill-opacity="0.4" />
      <circle cx="95" cy="96" r="0.9" fill="#553b24" fill-opacity="0.46" />
      <circle cx="115" cy="84" r="1.2" fill="#694a2e" fill-opacity="0.36" />
      <circle cx="17" cy="114" r="0.82" fill="#4e3721" fill-opacity="0.49" />
      <circle cx="44" cy="107" r="1.08" fill="#61452a" fill-opacity="0.4" />
      <circle cx="70" cy="119" r="0.88" fill="#543a23" fill-opacity="0.44" />
      <circle cx="89" cy="110" r="1.0" fill="#65482c" fill-opacity="0.38" />
      <circle cx="108" cy="121" r="0.8" fill="#4f3620" fill-opacity="0.48" />
    </pattern>

    <pattern id="lightFlecks" width="128" height="128" patternUnits="userSpaceOnUse">
      <rect width="128" height="128" fill="none" />
      <circle cx="7" cy="8" r="0.9" fill="#fff9ef" fill-opacity="0.34" />
      <circle cx="27" cy="21" r="0.8" fill="#fff6e6" fill-opacity="0.28" />
      <circle cx="49" cy="12" r="0.85" fill="#fff8ec" fill-opacity="0.32" />
      <circle cx="66" cy="28" r="0.75" fill="#fff2de" fill-opacity="0.26" />
      <circle cx="90" cy="16" r="0.9" fill="#fff7e8" fill-opacity="0.31" />
      <circle cx="112" cy="30" r="0.8" fill="#fff9ee" fill-opacity="0.3" />
      <circle cx="19" cy="39" r="0.75" fill="#fff4e2" fill-opacity="0.28" />
      <circle cx="37" cy="59" r="0.9" fill="#fff7ea" fill-opacity="0.3" />
      <circle cx="58" cy="46" r="0.82" fill="#fff5e5" fill-opacity="0.3" />
      <circle cx="81" cy="63" r="0.86" fill="#fffaef" fill-opacity="0.29" />
      <circle cx="104" cy="48" r="0.78" fill="#fff3df" fill-opacity="0.27" />
      <circle cx="116" cy="70" r="0.93" fill="#fff8ec" fill-opacity="0.31" />
      <circle cx="9" cy="77" r="0.88" fill="#fff8ed" fill-opacity="0.31" />
      <circle cx="30" cy="96" r="0.77" fill="#fff1db" fill-opacity="0.25" />
      <circle cx="50" cy="83" r="0.86" fill="#fff6e6" fill-opacity="0.3" />
      <circle cx="73" cy="98" r="0.8" fill="#fff8eb" fill-opacity="0.29" />
      <circle cx="95" cy="87" r="0.92" fill="#fff7e9" fill-opacity="0.3" />
      <circle cx="118" cy="102" r="0.78" fill="#fff2dc" fill-opacity="0.26" />
      <circle cx="20" cy="117" r="0.82" fill="#fff9ee" fill-opacity="0.3" />
      <circle cx="42" cy="111" r="0.86" fill="#fff5e3" fill-opacity="0.28" />
      <circle cx="63" cy="122" r="0.75" fill="#fffbf2" fill-opacity="0.31" />
      <circle cx="86" cy="114" r="0.91" fill="#fff6e7" fill-opacity="0.3" />
      <circle cx="109" cy="124" r="0.8" fill="#fff3de" fill-opacity="0.26" />
    </pattern>
  </defs>

  <g filter="url(#fiberOverlay)">
    <rect width="512" height="512" fill="url(#baseTone)" />
    <rect width="512" height="512" fill="url(#stockinette)" />
    <rect width="512" height="512" fill="url(#darkFlecks)" opacity="0.55" />
    <rect width="512" height="512" fill="url(#lightFlecks)" opacity="0.62" />
  </g>
</svg>
